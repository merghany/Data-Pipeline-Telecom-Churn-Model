version: '3.8'

services:

  # ── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: telecom_churn_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: telecom_churn
      MYSQL_USER: churn_user
      MYSQL_PASSWORD: churn_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - churn_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Data Generator (runs once, then exits) ──────────────────
  data_generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecom_data_generator
    restart: "no"
    command: >
      python generate_churn_data.py
        --host     mysql
        --port     3306
        --user     churn_user
        --password churn_pass
        --database telecom_churn
        --customers 500
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - churn_network

  # ── Adminer Web UI ──────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: telecom_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - churn_network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local

networks:
  churn_network:
    driver: bridge
