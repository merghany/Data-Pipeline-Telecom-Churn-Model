version: '3.9'

# ═══════════════════════════════════════════════════════════════
#  Telecom Churn — Full CDC Pipeline
#
#  Data flow:
#  MySQL (binlog) → Debezium → Kafka → Kafka Connect (JDBC Sink)
#                                    → Postgres (raw schema)
#                                    → dbt (staging → intermediate → marts)
#
#  Services:
#    mysql              Source database (binlog enabled)
#    data_generator     One-shot historical data loader
#    data_streamer      Continuous live event streamer (1/sec)
#    zookeeper          Kafka coordination
#    kafka              Message broker
#    kafka-init         Pre-creates internal topics (runs once)
#    kafka-connect      Debezium source connector worker
#    kafka-connect-sink JDBC sink connector worker
#    connector_setup    Registers connectors via REST API (exits)
#    postgres           Analytics target database for dbt
#    dbt                Transforms raw CDC data every 5 minutes
#    kafka-ui           Browse Kafka topics (http://localhost:8090)
#    adminer            Browse MySQL    (http://localhost:8080)
#    metabase           Analytics dashboard (http://localhost:3000)
# ═══════════════════════════════════════════════════════════════

# ── Shared Connect settings
x-connect-common: &connect-common
  CONNECT_BOOTSTRAP_SERVERS:                  "kafka:29092"
  CONNECT_KEY_CONVERTER:                      "org.apache.kafka.connect.json.JsonConverter"
  CONNECT_VALUE_CONVERTER:                    "org.apache.kafka.connect.json.JsonConverter"
  CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE:       "true"
  CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE:     "true"
  CONNECT_PLUGIN_PATH:                        "/usr/share/java,/usr/share/confluent-hub-components,/data/connect-jars"
  CONNECT_LOG4J_ROOT_LOGLEVEL:                "WARN"
  CONNECT_LOG4J_LOGGERS:                      "org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR"

services:

  # ── MySQL (source) ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: telecom_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      telecom_churn
      MYSQL_USER:          churn_user
      MYSQL_PASSWORD:      churn_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./mysql.cnf:/etc/mysql/conf.d/cdc.cnf:ro
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Historical bulk loader (runs once, then exits) ────────────
  data_generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecom_generator
    restart: "no"
    command: >
      python generate_churn_data.py
        --host mysql --port 3306
        --user churn_user --password churn_pass
        --database telecom_churn --customers 500
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telecom_net

  # ── Live event streamer (1 tick / second, runs forever) ───────
  data_streamer:
    build:
      context: .
      dockerfile: Dockerfile.streamer
    container_name: telecom_streamer
    restart: unless-stopped
    command: >
      python stream_churn_data.py
        --host mysql --port 3306
        --user churn_user --password churn_pass
        --database telecom_churn
        --interval 1.0 --events 3 --verbose
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telecom_net

  # ── Zookeeper ─────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: telecom_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: 1
      ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: 3
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Kafka broker ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: telecom_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                              1
      KAFKA_ZOOKEEPER_CONNECT:                      "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:         "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS:                   "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME:             "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:       1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:       0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:          1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:              "false"
      KAFKA_LOG_RETENTION_HOURS:                    168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initializer (runs once, exits) ────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: telecom_kafka_init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - telecom_net
    volumes:
      - ./kafka-init.sh:/kafka-init.sh
    entrypoint: ["bash", "/kafka-init.sh"]

   # ── Kafka Connect — Debezium source worker ────────────────────
  kafka-connect:
    image: debezium/connect:2.4
    container_name: telecom_kafka_connect
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Debezium Connect uses different variable names than Confluent
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "debezium-source-group"
      CONFIG_STORAGE_TOPIC: "debezium-connect-configs"
      OFFSET_STORAGE_TOPIC: "debezium-connect-offsets"
      STATUS_STORAGE_TOPIC: "debezium-connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      # Converters
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      ENABLE_DEBEZIUM_SCRIPTING: "true"
      # REST API
      REST_ADVERTISED_HOST_NAME: "kafka-connect"
      REST_PORT: "8083"
      # Plugin path
      CONNECT_PLUGIN_PATH: "/kafka/connect,/usr/share/java,/usr/share/confluent-hub-components"
      # Logging
      LOG_LEVEL: "WARN"
    ports:
      - "8083:8083"
    volumes:
      - ./connectors:/connectors:ro
      - kafka_connect_data:/kafka/connect
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Kafka Connect — Confluent JDBC sink worker ────────────────
  kafka-connect-sink:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: telecom_kafka_connect_sink
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *connect-common
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect-sink"
      CONNECT_REST_PORT:                 "8084"
      CONNECT_GROUP_ID:                  "jdbc-sink-group"
      CONNECT_CONFIG_STORAGE_TOPIC:               "jdbc-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC:               "jdbc-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC:               "jdbc-connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR:  "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR:  "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR:  "1"
    ports:
      - "8084:8084"
    volumes:
      - ./connectors:/connectors:ro
    command: ["bash", "-c", "confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:10.7.4 && /etc/confluent/docker/run"]
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Connector registration (runs once, exits) ─────────────────
  connector_setup:
    image: curlimages/curl:latest
    container_name: telecom_connector_setup
    restart: "no"
    depends_on:
      kafka-connect:
        condition: service_healthy
      kafka-connect-sink:
        condition: service_healthy
    volumes:
      - ./connectors:/connectors:ro
      - ./connector-setup.sh:/connector-setup.sh:ro
    entrypoint: ["sh", "/connector-setup.sh"]
    networks:
      - telecom_net

  # ── PostgreSQL (analytics target for dbt) ────────────────────
  postgres:
    image: postgres
    container_name: telecom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       telecom_dbt
      POSTGRES_USER:     dbt_user
      POSTGRES_PASSWORD: dbt_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d telecom_dbt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── dbt transformation runner (every 5 minutes) ───────────────
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile.dbt
    container_name: telecom_dbt
    restart: unless-stopped
    environment:
      DBT_HOST:     postgres
      DBT_PORT:     "5432"
      DBT_USER:     dbt_user
      DBT_PASSWORD: dbt_pass
      DBT_DBNAME:   telecom_dbt
      DBT_INTERVAL: "300"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telecom_net

  # ── Kafka UI (browse topics + messages) ──────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: telecom_kafka_ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:            telecom
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - telecom_net

  # ── Adminer (browse MySQL) ────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: telecom_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: dracula
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - telecom_net

  # ── Metabase (analytics dashboard) ───────────────────────────
  metabase:
    image: metabase/metabase:v0.60.x
    container_name: telecom_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE:       postgres
      MB_DB_HOST:       postgres
      MB_DB_PORT:       5432
      MB_DB_DBNAME:     metabase_app
      MB_DB_USER:       dbt_user
      MB_DB_PASS:       dbt_pass
      JAVA_TIMEZONE:    UTC
      MB_EMOJI_IN_LOGS: "false"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telecom_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mysql_data:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  kafka_connect_data:
  metabase_data:

# ── Network ───────────────────────────────────────────────────
networks:
  telecom_net:
    driver: bridge
