name: 'telecom_churn'
version: '1.0.0'
config-version: 2

profile: 'telecom_churn'

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
seed-paths:     ["seeds"]
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  telecom_churn:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      +post-hook: "ANALYZE {{ this }}"
